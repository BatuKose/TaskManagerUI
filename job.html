<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İş sayfası</title>
    <link rel="stylesheet" href="css/job.css">
</head>
<body>
    <label for="chkPasif">Biten işler/Devam eden işler</label>
    <input type="checkbox" id="chkPasif" checked>
    <button id="deleteJobHeader">İş başlığı sil</button>
    <button id="isKarsila">İş Karsila</button>
    <button id="isBaslikGuncelle">İş Başlık güncelle</button>
    <!--detaylı yapılmış iş tablosu-->
    <h3>Bütün işler</h3>
     <table id="BütünIsler" border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>İş Başlığı</th>
            <th>Yönetici</th>
            <th>Yönetici Rol</th>
            <th>Çalışan</th>
            <th>Çalışan Rol</th>
            <th>Oluşturma Tarihi</th>
            <th>Bitiş Tarihi</th>
            <th>İş Durumu</th>
        </tr>
    </thead>
        <tbody></tbody>
        <!--kendi isler tablosu-->    
    </table>
        <h3>Kendi işlerim</h3>
     <table id="kendiIsler" border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>İş Başlığı</th>
            <th>Yönetici</th>
            <th>Yönetici Rol</th>
            <th>Çalışan Rol</th>
            <th>Oluşturma Tarihi</th>
            <th>Bitiş Tarihi</th>
            <th>İş Durumu</th>
        </tr>
    </thead>
        <tbody></tbody>    
    </table>
     <!--İş silme onay--> 
        <div id="DeleteconfirmModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5);">
        <div style="background:white; padding:20px; width:300px; margin:200px auto; text-align:center;">
            <p>İşleme devam etmek istiyor musun?</p>
            <button id="DeletebtnYes">Evet</button>
            <button id="DeletebtnNo">Hayır</button>
        </div>
    </div>
    <!--iş başlığı güncelleme modal-->
        <div id="isBaslikUpdateModal" style="display:none; border:1px solid black; padding:15px; width:300px;">
        <h3>İş güncelle</h3>
        <div>
            <label>İş başlı<keygen></label>
            <input type="text" id="UpdateBaslik">
        </div>
        <div>
            <label>Kullanıcı</label>
            <select id="calisanlar"></select>
        </div>
        <br>
        <button id="isBaslikbtnSave">Kaydet</button>
        <button id="isBaslikbtnClose">Kapat</button>
    </div>

    <script src="scripts/job.js"></script>
</body>
</html>
