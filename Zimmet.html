</head>
<body>
    <button id="btnKategoriEkle">Kategori Ekle</button>
    <!--zimmet listesi-->

            <tr>Dosya numarası</tr>
            <tr>Ürün Ad</tr>
            <tr>Ürün Kategori</tr>
            <tr>Ürün Marka</tr>
            <tr>ürün Model</tr>

        <tbody></tbody>

<div style="display: none;" id="KategoriInsertModal">

            <div>
                <label>Ad</label>

            </div>
            <div>

                <input type="text" id="txtKategoriaciklamaInsertKaydet" />
            </div>
            <div>
                <button id="btnKategoriInsertIptal">İptal</button>

            </div>
    </div>
</div>
    <script src="scripts/zimmet.js"></script>
